# Ruff configuration for the AAA project
target-version = "py310"
line-length = 100
indent-width = 4

# Enable specific rule sets
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "D",    # pydocstyle
    "UP",   # pyupgrade
    "YTT",  # flake8-2020
    "ANN",  # flake8-annotations
    "S",    # flake8-bandit
    "BLE",  # flake8-blind-except
    "FBT",  # flake8-boolean-trap
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "COM",  # flake8-commas
    "C4",   # flake8-comprehensions
    "DTZ",  # flake8-datetimez
    "T10",  # flake8-debugger
    "EM",   # flake8-errmsg
    "EXE",  # flake8-executable
    "FA",   # flake8-future-annotations
    "ISC",  # flake8-implicit-str-concat
    "ICN",  # flake8-import-conventions
    "G",    # flake8-logging-format
    "INP",  # flake8-no-pep420
    "PIE",  # flake8-pie
    "T20",  # flake8-print
    "PYI",  # flake8-pyi
    "PT",   # flake8-pytest-style
    "Q",    # flake8-quotes
    "RSE",  # flake8-raise
    "RET",  # flake8-return
    "SLF",  # flake8-self
    "SLOT", # flake8-slots
    "SIM",  # flake8-simplify
    "TID",  # flake8-tidy-imports
    "TCH",  # flake8-type-checking
    "INT",  # flake8-gettext
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
    "ERA",  # eradicate
    "PD",   # pandas-vet
    "PGH",  # pygrep-hooks
    "PL",   # Pylint
    "TRY",  # tryceratops
    "FLY",  # flynt
    "NPY",  # NumPy-specific rules
    "PERF", # Perflint
    "RUF",  # Ruff-specific rules
]

# Ignore specific rules
ignore = [
    "D100",   # Missing docstring in public module
    "D101",   # Missing docstring in public class
    "D102",   # Missing docstring in public method
    "D103",   # Missing docstring in public function
    "D104",   # Missing docstring in public package
    "D105",   # Missing docstring in magic method
    "D107",   # Missing docstring in __init__
    "ANN101", # Missing type annotation for self
    "ANN102", # Missing type annotation for cls
    "ANN401", # Dynamically typed expressions (Any)
    "S101",   # Use of assert
    "S311",   # Standard pseudo-random generators
    "PLR0913", # Too many arguments
    "PLR0915", # Too many statements
    "PLR2004", # Magic value used in comparison
    "TRY003", # Avoid specifying long messages outside exception class
    "EM101",  # Exception must not use a string literal
    "EM102",  # Exception must not use an f-string literal
    "FBT001", # Boolean positional arg in function definition
    "FBT002", # Boolean default value in function definition
    "COM812", # Trailing comma missing (conflicts with formatter)
    "ISC001", # Implicitly concatenated string literals (conflicts with formatter)
]

# Exclude files and directories
exclude = [
    ".git",
    ".hypothesis",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "legacy",
    "migrations",
    "node_modules",
    "venv",
]

# Per-file ignores
[per-file-ignores]
"tests/**/*.py" = [
    "S101",   # Use of assert (allowed in tests)
    "ANN",    # Type annotations (less strict in tests)
    "D",      # Docstrings (less strict in tests)
    "PLR2004", # Magic values (common in tests)
    "S311",   # Random generators (common in tests)
]
"app/tests/**/*.py" = [
    "S101",   # Use of assert (allowed in tests)
    "ANN",    # Type annotations (less strict in tests)
    "D",      # Docstrings (less strict in tests)
    "PLR2004", # Magic values (common in tests)
    "S311",   # Random generators (common in tests)
]
"scripts/**/*.py" = [
    "T20",    # Print statements (allowed in scripts)
    "ANN",    # Type annotations (less strict in scripts)
]
"__init__.py" = ["F401"]  # Unused imports (common in __init__.py)

# Isort configuration
[isort]
known-first-party = ["app"]
force-single-line = false
force-sort-within-sections = true
single-line-exclusions = ["typing"]

# Mccabe complexity
[mccabe]
max-complexity = 10

# Pydocstyle configuration
[pydocstyle]
convention = "google"

# Flake8-quotes configuration
[flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"
avoid-escape = true