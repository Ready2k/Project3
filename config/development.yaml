# Development environment configuration
# Overrides base configuration for development

app:
  debug: true
  log_level: DEBUG

database:
  name: aaa_dev_db

cache:
  directory: cache/dev
  size_limit: 536870912  # 512MB for development

security:
  enable_prompt_defense: false  # Disabled for easier development
  max_input_length: 50000  # Higher limit for development

ui:
  show_debug: true
  theme: light

logging:
  level: DEBUG

# Development-specific feature flags
enable_analytics: false

# Relaxed security for development
advanced_prompt_defense:
  enabled: false
  log_all_detections: false

# Development-specific LLM settings
llm_providers:
  - name: openai
    model: gpt-3.5-turbo  # Cheaper model for development
    timeout: 60  # Longer timeout for debugging
    max_retries: 1  # Fewer retries for faster feedback
    temperature: 0.7
  - name: claude
    model: claude-3-haiku-20240307  # Faster model for development
    timeout: 60
    max_retries: 1
    temperature: 0.7