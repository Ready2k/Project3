# Production environment configuration
# Overrides base configuration for production

app:
  debug: false
  log_level: WARNING
  workers: 4

database:
  name: aaa_prod_db
  pool_size: 20
  max_overflow: 40

cache:
  type: redis  # Use Redis in production
  size_limit: 2147483648  # 2GB
  ttl_seconds: 7200  # Longer TTL in production

security:
  enable_prompt_defense: true
  max_input_length: 5000  # Stricter limit in production
  rate_limit_requests: 50  # More restrictive rate limiting
  rate_limit_window: 3600
  allowed_origins:
    - "https://yourdomain.com"
    - "https://app.yourdomain.com"

ui:
  show_debug: false
  theme: light

logging:
  level: WARNING

# Full security enabled in production
advanced_prompt_defense:
  enabled: true
  log_all_detections: true
  alert_on_attacks: true

# Production LLM settings
llm_providers:
  - name: openai
    model: gpt-4
    timeout: 30
    max_retries: 3
    temperature: 0.5  # More deterministic in production
  - name: claude
    model: claude-3-sonnet-20240229
    timeout: 30
    max_retries: 3
    temperature: 0.5